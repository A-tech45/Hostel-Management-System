<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black; color: azure;">
<ul class="list">
    <li> one </li>
</ul>    
</body>
<script>

// CREATE A NEW LIST
    function Optlang(lname){
        const li = document.createElement('li');   // This is the most optimised method
        li.appendChild(document.createTextNode(lname))
        document.querySelector('.list').appendChild(li)
    }
    Optlang("java")
    Optlang("Python")

//EDIT AN EXISTING LIST

    const lis = document.querySelector("li:nth-child(3)") //We slected the list Element we wanted to edit
    //console.log(lis)
    const nli = document.createElement("li")   // Created a new list and save in a variable
    nli.textContent = " Oh My God"       // Write the value we want to enter 
    lis.replaceWith(nli)        // Replace it with the slected list Element

// REMOVE

  const lii = document.querySelector('li:last-Child ')  // Slect the element u want to remove
  lii.remove()      //Use the function remove to remove the element
</script>
</html>

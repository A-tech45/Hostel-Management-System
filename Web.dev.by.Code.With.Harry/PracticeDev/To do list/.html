<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #d9f2ec, #b2dfdb);
        }

        .container {
            width: 400px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-section input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .input-section button {
            padding: 10px 20px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .input-section button:hover {
            background: #218838;
        }

        ul {
            list-style: none;
        }

        li {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f5f5f5;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>My To-Do List</h2>

        <div class="input-section">
            <input type="text" placeholder="Enter task">
            <button>Add</button>
        </div>

        <ul>
            <li>Study HTML</li>
            <li>Practice CSS</li>
            <li>Complete Assignment</li>
        </ul>
    </div>

</body>
</html>

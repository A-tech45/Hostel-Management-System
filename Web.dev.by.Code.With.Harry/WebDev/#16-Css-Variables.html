<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css variables</title>
    <style>
        :root{
            --color:rgb(232, 99, 99);
            --seccolor:rgb(149, 91, 91);
        }
        *{
            margin:0;
            padding:0;
        }
        .cntr{
            background-color: var(--color);
        }
        .nav{
            background-color: aquamarine;
        }

        ul{
            display: flex;
        }
        ul li{
            list-style: none;
            padding:20px;
        }
    </style>
</head>

<body>
    <div class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>
    <div class="cntr">Lorem ipsum, dolor sit amet consectetur adipisicing elit.
        Possimus saepe perferendis veniam neque quod error adipisci quo dolore exercitationem.
        Totam cumque sit doloremque culpa reiciendis nulla, tempore perspiciatis earum provident?
    </div>
</body>

</html>

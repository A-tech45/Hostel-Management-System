<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li {
            list-style: none;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .sle {
            color: green;
        }

        .one {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

        .two {
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 2;
            grid-row-end: 7;
            height: auto;
            border: 2px solid black;
            border-radius: 9px;
        }

        .three {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        #del {
            background-color: red;
            color: white;
            font-size: 14px;
            font-weight: bolder;
            border: 1px red;
            border-radius: 4px;
            padding: .4em;
        }

        #ook {
            background-color: rgb(111, 32, 239);
            color: white;
            font-size: 14px;
            font-weight: bolder;
            border: 1px rgb(111, 32, 239);
            border-radius: 4px;
            padding: .4em;
        }
        #text{
            height: 20px;
            width: 320px;
            border-radius: 5px;
        }
    </style>
</head>

<body style="background-color: rgb(255, 255, 255); color: rgb(0, 0, 0);">
    <div class="one">
        <h1>To-Do</h1>
        <div class="two">
            <ul class="three">
                <li><input id="text" autocomplete="off"></li>
                <li><button id="ook">submit</button></li>
                <li> <button id="del">Delete</button></li>
            </ul>

            <ul id="ok"></ul>

        </div>
    </div>
</body>
<script>
    let iid = null;
    let count = 0;
    function adto(lname) {
        const li = document.createElement('li');
        li.innerHTML = `${lname}`
        count++;
        li.id = count;
        li.onclick = function (event) {
            li.classList.toggle("sle");
            iid = event.currentTarget.id;
            console.log(iid)
        }
        document.querySelector('#ok').appendChild(li)

    }

    let username;
    document.getElementById('ook').onclick = function () {           // This runs the functio  whenever the button is clicked
        input = document.getElementById('text');                   // Stores the input from the input bar
        let username = input.value;
        adto(username)                    // calls the function adto
        input.value = "";          // Thhis Removes the previous typed text 
    }

    document.getElementById('del').onclick = function () {
        if (iid !== null) {
            const li = document.getElementById(iid);
            if (li) li.remove();
            iid = null;
        }
    }

    //let un ;
    //un = window.prompt("Hello")
    //adto(un)
</script>

</html>

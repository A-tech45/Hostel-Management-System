<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color paras different colors</title>
    <style>
         div p:first-child{
            color: red;
         }
         div p:last-child{
            color:blue;
         }
    </style>
</head>
<body>
    <div>
        <p>Hello i am a para</p>
        <p>Hello i am another para</p>
    </div>
</body>
</html>

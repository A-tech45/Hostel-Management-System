<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bg-Color Changer</title>
    <style>
        body{
                 background-color: grey ;
        }
        .button{
            border: 1px solid black;
            padding : 25px ;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="change">

        <h1>Hello</h1>

        <h1>Click To Change Bg Color</h1>
        <span class="button" id="red" style="background-color: red;"></span>
        <span class="button" id="green" style="background-color: rgb(28, 187, 102);"></span>
        <span class="button" id="grey" style="background-color: rgb(137, 150, 144);"></span>
        <span class="button" id="yellow" style="background-color: rgb(255, 249, 62);"></span>
    </div>
    <ul>
        <li class="hello">one</li>
        <li class="hello">two</li>
        <li class="hello">three</li>
    </ul>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>line-h and letter-s</title>
    <style>
        div {
            color: red;
            -webkit-text-stroke: 0.5px black;
            background-color: rgb(203, 240, 240);
            line-height: 100px;
            letter-spacing: 130px;
            font-size: 40px;
            font-style: italic;
            border: 7 olopx solid blue;
        }
    </style>
</head>

<body>
    <div>
        &nbsp;ABCD<br>
        &nbsp;EFGH<br> &nbsp;IJKL<br> &nbsp;MNOP<br> &nbsp;QRST<br> &nbsp;UVWX<br> &nbsp;YZ

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wallpaper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        body{
            background: linear-gradient(to top, rgb(48, 243, 194) , rgb(255, 255, 255));
            min-height: 100vh;
        }
        .wall {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 380px;
            font-family: "Oswald", sans-serif;
            font-weight: bold;
            background-clip: text;
            -webkit-background-clip: text;
            background-image: url(Text.png);
        }
        .wall span{
            color:transparent;
        }
    </style>
</head>

<body>
    <div class="wall">
        <span>HELLO</span>
        
    </div>
</body>

</html>

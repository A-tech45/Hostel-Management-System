<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="calculator.css">
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:20px}</style>
</head>
<body>
  <h2>Simple Calculator</h2>
  <div class="calculator">
    <input id="display" class="display" value="0" readonly>
    <div class="keys">
      <button class="btn" data-value="C">C</button>
      <button class="btn" data-value="←">←</button>
      <button class="btn" data-value="%">%</button>
      <button class="btn op" data-value="/">÷</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn op" data-value="*">×</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn op" data-value="-">−</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn op" data-value="+">+</button>

      <button class="btn zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn eq" data-value="=">=</button>
    </div>
  </div>

  <script src="calculator.js"></script>
</body>
</html>

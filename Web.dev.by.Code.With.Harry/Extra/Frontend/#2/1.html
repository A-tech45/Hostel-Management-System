<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Future</title>
    <style>
        body {
            background-color: aquamarine;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        * {
            padding: 0;
            margin: 0;
        }

        .container {
            background-color: rgb(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 29vh;
            width: 500px;
            border: 2px solid rgb(31, 248, 219);
            border-radius: 14px;
        }

        .imog {
            display: none;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 1809px;
            border: 4px solid black;
            background-color: black;
        }

        img {
            height: 100vh;
        }

        input {
            height: 30px;
            margin: 10px;
        }

        label {
            font-size: 24px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: bold;
        }

        .prs {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .show {
            display: block;
        }
  
    </style>
</head>

<body>
   
    <div id="cntr" class="container">
        <label>Enter ur Age !</label>
        <div class="prs">
            <input type="text">
            <button id="btn">Click Here</button>
        </div>
</div>


    <div id="kol" class="imog">
        <img src="gorilal.png" alt="opp">
    </div>
    <audio id="sound" src="fahhhhh.mp3"></audio>
</body>
<script>


   document.getElementById('btn').onclick = function toggleSidebar() {
       
        document.getElementById('cntr').style.display = "none";
        document.getElementById('kol').style.display = "flex";
        document.getElementById('sound').play();
    }


</script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box Exersise</title>
    <style>
        body{
            background-color: rgb(56, 164, 164);
        }
        .container{
            display:flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            left: 480px;
            top: 90px;
            border: 2px solid black;
            border-radius: 20px;
            width: 500px;
            height: 400px;
            background-color:rgb(209, 142, 112) ;
        }
        .name{
            align-content: center;
            text-align: center;
            border: 2px solid black;
            border-radius: 15px;
            width: 400px;
            height: 60px;
            margin: 5px;
            background-color: antiquewhite;
        }
        .pass{
            border: 2px solid black;
            border-radius: 15px;
            width: 400px;
            height: 60px;
            margin: 5px;
            background-color: antiquewhite;
        }
        .log{
            font-size: 30px;
            position: inherit;
            top: -50px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .su{
            position: relative;
            border: 2px solid black;
            border-radius: 10px;
            padding: 5px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="log">LOGIN HERE</div>
        <div class="name"></div>
        <div class="pass"></div>
        <div class="su">SIGN UP</div>
    </div>
    
</body>
</html>

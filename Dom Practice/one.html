<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    .clr{
         padding: 20px;
         height: 10px;
         width: 10px;
         margin: 10px;
         border: 1px solid rgb(255, 255, 255);
        cursor: pointer;
    }
    #red{
        background-color: red;
    }
    #green{
        background-color: green;
    }
    #blue{
        background-color: rgb(85, 202, 241);
    }
    .cntnr{
        position: relative;
        left: 150px ;
        background-color: aliceblue;
        padding: 20px;
        height : 140px ;
        width : 140px;
    }
    
   </style>
</head>
<body style="background-color: black;">
    <div class="colors">
        <div id= "red" class="clr"></div>
        <div id= "green" class="clr"></div>
        <div id= "blue" class="clr"></div>
    </div>
    <div id = "cntr" class="cntnr"></div>
</body>
<script>
const btn = document.querySelectorAll(".clr");

btn.forEach(function(element) {
    console.log(element.id);
    element.addEventListener("click", function() {
        const color = element.id;
        document.getElementById("cntr").style.backgroundColor = color;
    });
});
</script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin: 0%;
    padding: 0%;
}

.parent {
    display: grid;
    border: 2px solid red;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 8px;
}
    
.div5 {
    border: 2px solid red;
    grid-column: span 3 / span 3;
    grid-row: span 4 / span 4;
    grid-column-start: 3;
    grid-row-start: 2;
}

.div6 {
    border: 2px solid red;
    grid-column: span 3 / span 3;
    grid-column-start: 3;
    grid-row-start: 1;
}

.div7 {
    border: 2px solid red;
    grid-column: span 3 / span 3;
    grid-column-start: 3;
    grid-row-start: 6;
}
.x{
    display: flex;
    flex-direction: row;
    list-style: none;
    
    align-items: center;
}   
.parent .div6 .x li{
    background-color: aqua;
    padding: 9px;

}  

    </style>
</head>
<body>
    
<div class="parent">
    <div class="div6">
        <ul class="x">
            <li>on</li>
            <li>two</li>
        </ul>
    </div>
    <div class="div5">3
        4
        4

    </div>
    <div class="div7">7</div>
</div>
    
</body>
</html>

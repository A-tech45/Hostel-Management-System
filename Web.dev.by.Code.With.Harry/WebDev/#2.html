<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        select {
            border:2px  solid red;
            border-radius: 23px;
        }
    </style>
    
    
</head>

<body>
    <h1> My first form </h1>
    <form action="post">
        <div>
            <label for="username">Enter ur user name</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div>
            <input type="radio" id="basic" name="subscription" value="basic">
            <label for="basic">Basic Plan</label>

            <input type="radio" id="pro" name="subscription" value="pro">
            <label for="pro">Pro Plan</label>

            <input type="radio" id="business" name="subscription" value="business">
            <label for="business">Business Plan</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>
        <div>
            <lebel for="comment">Enter ur username ..</lebel>
            <br>
            <textarea id="comment" name="comment" rows="9" cols="50"></textarea>
        </div>
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>
    </form>
</body>

</html>
